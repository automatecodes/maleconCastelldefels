services:
  maleconcastelldefels-db:
    image: postgres:16-alpine
    container_name: maleconcastelldefels-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - maleconcastelldefels_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  maleconcastelldefels-api:
    build: ./backend
    container_name: maleconcastelldefels-api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: maleconcastelldefels-db
      MEDIA_ROOT: /data/media
    volumes:
      - ./data/media:/data/media
    depends_on:
      maleconcastelldefels-db:
        condition: service_healthy
    networks:
      maleconcastelldefels_internal:
        aliases:
          - api
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  maleconcastelldefels-worker:
    build: ./worker
    container_name: maleconcastelldefels-worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: maleconcastelldefels-db
    depends_on:
      maleconcastelldefels-db:
        condition: service_healthy
    networks:
      - maleconcastelldefels_internal

  maleconcastelldefels-frontend:
    build: ./frontend
    container_name: maleconcastelldefels-frontend
    restart: unless-stopped
    depends_on:
      maleconcastelldefels-api:
        condition: service_healthy
    networks:
      - maleconcastelldefels_internal
      - proxyNet
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  maleconcastelldefels_internal:
    name: maleconcastelldefels_internal
    driver: bridge
    internal: true
  proxyNet:
    external: true
    name: proxyNet
