server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ^~ impide que las reglas regex de abajo intercepten estas rutas
    # API → backend
    location ^~ /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # Media (imágenes, vídeos, PDFs) → backend
    location ^~ /media/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # SPA: todas las rutas que no sean archivos estáticos → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché agresiva para los assets del build de Vite (JS/CSS con hash)
    location ~* \.(?:js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Caché moderada para imágenes estáticas del build (favicon, logo, etc.)
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
