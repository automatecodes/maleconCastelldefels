<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <clipPath id="c"><circle cx="30" cy="30" r="30"/></clipPath>
  </defs>
  <g clip-path="url(#c)">
    <!-- Senyera: 9 franjas alternadas oro/rojo (5 oro, 4 rojo) -->
    <rect width="60" height="60" fill="#FCDD09"/>
    <rect y="6.67"  width="60" height="6.67" fill="#CF0921"/>
    <rect y="20"    width="60" height="6.67" fill="#CF0921"/>
    <rect y="33.33" width="60" height="6.67" fill="#CF0921"/>
    <rect y="46.67" width="60" height="6.67" fill="#CF0921"/>

    <!-- Triángulo azul (Estelada blava) — vértice derecho en (28, 30) -->
    <polygon points="0,0 0,60 28,30" fill="#003189"/>

    <!-- Estrella blanca de 5 puntas, centrada en el triángulo (~13, 30) -->
    <!-- Radio exterior: 7, radio interior: 2.8 -->
    <polygon
      points="13,23
              14.6,27.9
              19.7,27.9
              15.5,30.9
              17.2,35.8
              13,32.8
              8.8,35.8
              10.5,30.9
              6.3,27.9
              11.4,27.9"
      fill="white"/>
  </g>
</svg>
