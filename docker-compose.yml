services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      MEDIA_ROOT: /data/media
    volumes:
      - ./data/media:/data/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  worker:
    build: ./worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    # Servido por nginx-proxy + acme-companion (SSL). No se exponen puertos al host.
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - api
    networks:
      - internal
      - proxyNet

networks:
  internal:
    driver: bridge
  proxyNet:
    external: true
